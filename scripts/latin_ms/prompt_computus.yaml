# transcriber-shell prompt config for computus manuscripts (Carolingian, 500-1100).
# Pass to --prompt in stages 3 and 4.
# sourcePageId is overridden per-image by transcriber-shell batch.

targetLanguage: "lat-Latn"
targetEra: "early_medieval"
eraRange: "500-1100"
diplomaticProfile: "layout_aware"
diplomaticToggles: "{\"preserveLineBreaks\": true, \"preserveOriginalAbbreviations\": true, \"captureUnclearGlyphShape\": true}"
normalizationMode: "diplomatic"
languageSet: "[]"
scriptNotesOptional: >
  Caroline Minuscule, 6th-11th century computus and astronomical manuscripts.

  SCRIPT: Caroline Minuscule — round, upright letterforms with clear word separation
  (improving through the period; earliest MSS may still run words together). Key ligatures:
  ae/oe written as ligature (æ/œ) or e-caudata; ri and ti ligatures frequent; ct, st, and
  sp ligatures present; do not confuse ti ligature with ci. Long descenders on p, q, g.
  Uncial d and r-rotunda appear in some scriptoria; transcribe as d/r (standard form) unless
  the variant is systematic — then note in segment metadata.

  SEGMENTATION: produce one segment per TextLine from the supplied PageXML — the TextLine
  count is given in the lineation hint; your segment count must match it exactly. Set
  lineRange to the single line number for each segment (e.g. lineRange: "1", "2", ...).

  ROMAN NUMERALS: ALL numerals in computus MSS are Roman. Transcribe VERBATIM — I, V, X, L,
  C, D, M — NEVER convert to Arabic digits. Ordinals written with a macron or superscript
  letter are preserved exactly: iiiᵒ, vᵒ, xiiᵒ. Dot-separated numerals (·iii·, ·xix·)
  preserve the surrounding dots. Additive sequences (iiii = 4, viiii = 9) are standard for
  this period — do NOT silently change iiii to iv or viiii to ix.

  ANTI-HALLUCINATION — NUMBERS: Do NOT supply expected or computed values for quantities
  such as epact, concurrentes, regulares, or lunar age. Each number must be anchored to
  visible letterforms on the image. If a cell in an Easter table appears blank or damaged,
  write [illegible] or [lacuna] — do not reconstruct from the cycle logic.

  COMPUTUS VOCABULARY: preserve the following technical terms exactly as written; do not
  normalise spelling variants across witnesses:
    epacta / epactae          — lunar epact (age of moon on 1 January)
    embolismus / embolismi    — intercalary/embolismic year
    concurrentes              — solar concurrents (weekday key)
    regulares                 — table regulars for kalend computation
    saltus lunae              — "leap of the moon" (19-year correction)
    cyclus / ciculus          — cycle (decennovenalis, solaris, etc.)
    indictio                  — 15-year fiscal cycle
    bissextus                 — leap year / bissextile
    feria (I–VII)             — weekday designation
    luna (e.g. luna xiv)      — moon age at a given calendar point
    sol                       — solar position
    KL / Kl̃                   — Kalende/Kalends abbreviation (preserve tilde)
    NON / Non̄                 — Nonae abbreviation
    ID / Id̄                   — Idus abbreviation
  Transcribe abbreviated forms exactly as they appear, including any superscript,
  tilde, or macron suspension marks.

  ABBREVIATIONS: the nasal bar (macron over vowel = m/n suspension) is extremely
  common — preserve using Unicode combining macron (U+0305) over the vowel, e.g.
  "mēsis" for "menssis". Tilde suspension (U+0303) for final -us, -tur, -que.
  Superscript letters: retain as superscript if the protocol supports it, otherwise
  mark with caret notation (e.g. q^i for qui). Do NOT silently expand any abbreviation.
  Common computus-specific abbreviations: KL, NON, ID (kalend/nones/ides); ṁ for
  "mense"; ạ for "anno"; i̊ for indictione; dc for "decennovenalis cyclus".

  TABLES: many computus pages are columnar or grid-structured (19-year Metonic tables,
  Easter tables with feria, epact, and luna columns; kalend sequences; regnal-year
  synchronisms). If the page is a table:
    (1) Transcribe each TextLine as a single row segment; do NOT merge rows.
    (2) COLUMN DELIMITERS — use a pipe character | to separate columns within a row,
        regardless of how the MS marks the boundary (vertical stroke, dot, spacing, or
        rubrication). Insert | at every inferred column boundary. If the MS already has
        an explicit separator character, keep it AND add a | beside it for clarity,
        e.g. "xix · | v | xviiii".
    (3) COLUMN HEADER SEGMENT — if a header row (column labels) is present, transcribe
        it as its own segment with position: table_header. In that segment's notes
        field, list the inferred column sequence, e.g. "columns: year | epact |
        concurrentes | luna_xiv | feria_paschalis". All subsequent row segments inherit
        that column order — do NOT re-describe it per row.
    (4) TABLE TYPE — in the notes field of the first table row, name the table type:
        "tableType: metonic_cycle", "tableType: easter_table",
        "tableType: calendar_kalends", "tableType: feria_regulares", etc.
    (5) POSITION FIELD — set position: table_row for data rows,
        position: table_header for the header row.
    (6) BLANK/DAMAGED CELLS — if a cell is empty or illegible, write [lacuna] in that
        column position, e.g. "cccc | [lacuna] | v | xix".
    (7) Do NOT reorder entries within a row to match an expected Easter-table schema.
        Transcribe the columns in left-to-right visual order only.
    (8) Ruling lines (dry-point or ink) are not text — omit them from the transcript.

  GREEK: some computus MSS include Greek loanwords or genuine Greek passages (especially
  in texts derived from Dionysius Exiguus or Irish computistica). If a term is a
  Latinised Greek loanword (epacta ← ἐπακτή, embolismus ← ἐμβολισμός) transcribe the
  Latin form as written. If genuine Greek characters appear on the page (rare but attested
  in insular computus), transcribe as [greek: <characters>] and flag confidence low.

  ABBREVIATIONS — PILCROWS AND SECTION MARKS: transcribe ¶ and § exactly where present;
  they often mark cycle boundaries or chapter divisions in computus florilegia.

  UNCERTAINTY: use [uncertain: X / Y] freely for ambiguous letterforms. Roman numeral
  sequences are the highest-risk ambiguity: distinguish carefully between l (50) and I+I
  (2), between c (100) and e, between m (1000) and ni or m-abbreviation. When a number
  is uncertain, give both candidate readings, e.g. [uncertain: xix / xiv].

  ANTI-HALLUCINATION — PROPER NOUNS AND FORMULAE:
  Transcribe only letterforms visibly present. Do not supply expected names (Beda,
  Dionysius, Isidorus) or standard formula completions from memory. If an author
  attribution or rubric is partially damaged, use [illegible] for the unreadable portion.

  GROUND RULE: every word and every numeral in your output must be anchored to a visible
  letterform on the image. When in doubt, mark uncertain or illegible — never guess to
  produce a computationally correct result.
englishHandwritingModality: ""
epistemicNotesOptional: ""
runMode: "standard"
sourcePageId: "PLACEHOLDER"
protocolVersion: "1.1.0"
