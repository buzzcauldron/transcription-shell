# Middle English vernacular manuscripts (1150-1500).
name: middle_english_vernacular
language: enm-Latn
era: 1150-1500
script: anglicana_cursiva

llm:
  primary: claude-sonnet-4
  fallback: gemini-2.5-pro

htr:
  model: gm-htr-r2_best

segmentation:
  model: kraken-merged-seg_best

prompt: prompt_middle_english.yaml

notes: >
  Anglicana or secretary hand; yogh, thorn, eth. Verse and prose.
  R2 general model; anglicana fine-tune (Bridges r7) will improve results
  when available.
