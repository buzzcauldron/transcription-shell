# Medieval Old French / Anglo-Norman manuscripts (1100-1500).
name: medieval_french
language: fra-Latn
era: 1100-1500
script: gothic_cursiva

llm:
  primary: claude-sonnet-4
  fallback: gemini-2.5-pro

htr:
  model: gm-htr-r5-best

segmentation:
  model: kraken-merged-seg_best

prompt: prompt_medieval_french.yaml

notes: >
  Old French and Anglo-Norman; mixed Latin formulae in charters and administrative
  registers. R5 HTR model covers Gothic cursiva; abbreviation density moderate.
