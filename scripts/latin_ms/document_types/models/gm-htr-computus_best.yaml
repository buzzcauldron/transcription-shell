# Carolingian/computus HTR — fine-tune from gm-htr-r2_best on early medieval Latin scientific MSS.
# Specialist model targeting Caroline minuscule computus and astronomical texts, 6th-11th c.
# Not yet trained — placeholder path; will be rsynced from CMU once training completes.
name: gm-htr-computus_best
kind: htr
path: "${HOME}/src/latin_documents/gm-htr-computus_best.mlmodel"
size_mb: 24

languages: [lat-Latn]
eras: [late_antique, early_medieval]
scripts: [caroline_minuscule]
era_range: "500-1100"

training:
  base_model: gm-htr-r2_best
  round: "c1"
  date: null
  corpora: [caroline-minuscule, carolingian-latin-2025, carolingian-latin-vienna, paris-bible, eutyches, catmus-medieval, cremma-medieval-lat]
  hyperparams:
    learning_rate: 0.00001
    batch_size: 8
    schedule: cosine
    augment: true
    precision: bf16-mixed
    lag: 20

metrics:
  val_cer: null
  per_corpus_cer: {}
  notes: "Carolingian minuscule specialist; target: computus and early medieval Latin scientific texts. Not yet trained — run scripts/train_computus_htr.sh."
