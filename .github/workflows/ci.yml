name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Verify transcription-protocol submodule
        run: |
          test -d vendor/transcription-protocol/benchmark || {
            echo "Missing vendor/transcription-protocol/benchmark — init submodules: git submodule update --init --recursive vendor/transcription-protocol"
            exit 1
          }

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Check VERSION matches pyproject.toml
        run: python scripts/check_version.py

      - name: Check synced markdown + VERSION vs pyproject.toml
        run: python scripts/sync_repo_docs.py --check

      - name: Install package and test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[api,dev,xml-xsd]"

      - name: Run tests
        run: pytest -q --tb=short

      - name: Build sdist/wheel smoke
        run: |
          python -m pip install build twine
          python -m build --outdir dist/
          twine check dist/*

  docker:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Verify transcription-protocol submodule
        run: |
          test -d vendor/transcription-protocol/benchmark || {
            echo "Missing vendor/transcription-protocol/benchmark"
            exit 1
          }

      - name: Build Docker image
        run: |
          APP_VERSION=$(tr -d ' \t\n\r' < VERSION)
          docker build --build-arg "APP_VERSION=${APP_VERSION}" -t "transcriber-shell:${APP_VERSION}" .
