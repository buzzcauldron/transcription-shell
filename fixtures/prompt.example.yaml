# Minimal example for transcriber-shell run --prompt
# Matches keys used by benchmark/prompt_builder.build_zones (see transcription-protocol).

targetLanguage: "lat-Latn"
targetEra: "medieval"
eraRange: "1150-1300"
diplomaticProfile: "strict"
diplomaticToggles: "{}"
# Default matches GUI (Diplomatic unchecked) / CLI without --diplomatic / API without diplomatic=true.
# For main text only with no normalizedLayer, use normalizationMode: "diplomatic" or pass --diplomatic.
normalizationMode: "normalized"
languageSet: "[]"
scriptNotesOptional: "abbreviated legal Latin; align lineRange with PageXML TextLine count"
englishHandwritingModality: ""
epistemicNotesOptional: ""
runMode: "efficient"
sourcePageId: "example-folio-1r"
protocolVersion: "1.1.0"
